databases:
  - name: godstime-lodge-db
    plan: free
    databaseName: godstime_lodge
services:
  - type: web
    name: godstime-lodge
    runtime: node
    plan: free
    buildCommand: npm ci && npm test
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /tmp/godstime-lodge-data
      - key: ADMIN_EMAIL
        value: admin@godstimelodge.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: godstime-lodge-db
          property: connectionString
