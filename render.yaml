services:
  - type: web
    name: gods-time-lodge
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: COOKIE_SECURE
        value: "true"
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
